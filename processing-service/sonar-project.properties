# SonarCloud - Processing Service
# Project key alinhado ao Maven (groupId:artifactId) para manter consistência com os projetos já criados.
#
# Nota: o sonar-maven-plugin usa por padrão sonar.host.url=http://localhost:9000 e NÃO carrega
# este arquivo automaticamente (ver https://learn-it-university.com/why-sonar-analysis-with-mvn-sonarsonar-is-ignoring-your-sonar-project-properties-file/).
# Por isso sonar.host.url e sonar.organization estão definidos no pom.xml para garantir uso do SonarCloud.

sonar.host.url=https://sonarcloud.io
sonar.projectKey=com.fiap.fiapx:processing-service
sonar.projectName=Processing Service

# Cobertura: exclusões alinhadas ao JaCoCo
sonar.coverage.exclusions=\
  **/ProcessingServiceApplication.java,\
  **/config/**,\
  **/dto/**,\
  **/exception/**,\
  **/exceptionhandler/**,\
  **/ports/**,\
  **/domain/enums/**
