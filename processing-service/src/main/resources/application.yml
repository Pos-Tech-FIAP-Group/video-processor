server:
  port: 8083

# Base path for video and zip storage; consumer reads videos and writes zips under this path.
processing:
  storage:
    base-path: ${PROCESSING_STORAGE_BASE_PATH:/data}
    s3:
      bucket: ${PROCESSING_STORAGE_S3_BUCKET:}
      region: ${AWS_REGION:}

spring:
  application:
    name: processing-service
  
  # RabbitMQ Configuration
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:admin}
    password: ${SPRING_RABBITMQ_PASSWORD:admin123}
    
    # Processing queue configuration
    processing:
      exchange: video.processing.exchange
      queue: video.processing.queue
      routing-key: video.processing.requested
    
    # Events: processing-service publica conclusão na fila consumida pelo video-service
    events:
      exchange: video.processing.events.exchange
      queue:
        completed: video.processing.completed.processing-service
        failed: video.processing.failed.processing-service
      routing-key:
        completed: video.processing.completed
        failed: video.processing.failed
    
    # Dead Letter Queue
    dlq:
      exchange: video.processing.dlq.exchange
      queue: video.processing.dlq
    
    # Listener configuration (paralelismo)
    listener:
      concurrency:
        min: 5
        max: 20
      prefetch: 10

# Logging Configuration
logging:
  level:
    root: INFO
    com.fiap.fiapx.processing: DEBUG
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{videoId}] %logger{36} - %msg%n"
