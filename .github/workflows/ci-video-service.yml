name: CI Video Service

on:
  push:
    branches: [main]
    paths:
      - 'video-service/**'
      - 'pom.xml'
      - '.github/workflows/ci-video-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'video-service/**'
      - 'pom.xml'
      - '.github/workflows/ci-video-service.yml'
  workflow_dispatch:

concurrency:
  group: ci-video-service-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  SERVICE_PATH: video-service
  IMAGE_NAME: video-processor-video-service
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run unit tests
        working-directory: ${{ env.SERVICE_PATH }}
        run: mvn -B test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [ unit-tests ]
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Pull Testcontainers images
        run: |
          docker pull testcontainers/ryuk:0.11.0
          docker pull postgres:16-alpine

      - name: Run integration tests
        working-directory: ${{ env.SERVICE_PATH }}
        run: mvn -B test-compile failsafe:integration-test failsafe:verify

      - name: Publish JaCoCo coverage
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: video-service/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts for Sonar
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-service-build
          path: |
            video-service/target/classes/**
            video-service/target/test-classes/**
            video-service/target/site/jacoco/jacoco.xml
            video-service/target/jacoco.exec
          if-no-files-found: error

  bdd-tests:
    name: BDD Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Placeholder for BDD tests
        run: echo "BDD tests job preparado. Os cenários serão adicionados no próximo PR."

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, bdd-tests]
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: video-service-build
          path: video-service/target

      - name: Run SonarCloud analysis
        working-directory: ${{ env.SERVICE_PATH }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_VIDEO_PROCESSOR }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=pos-tech-fiap-group
          -Dsonar.projectKey=com.fiap.fiapx:video-service
          -Dsonar.java.binaries=target/classes
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          -Dsonar.coverage.exclusions=src/main/java/**/VideoServiceApplication.java,src/main/java/**/config/**/*.java,src/main/java/**/dto/**/*.java,src/main/java/**/exception/**/*.java,src/main/java/**/exceptionhandler/**/*.java,src/main/java/**/exceptions/**/*.java,src/main/java/**/ports/**/*.java,src/main/java/**/domain/enums/**/*.java,src/main/java/**/entity/**/*.java

  docker:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, bdd-tests, sonar]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image owner lowercase
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_OWNER_LC }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.SERVICE_PATH }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max