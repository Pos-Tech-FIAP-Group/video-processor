# CI: video-service - build, test (80% coverage), SonarCloud, build image, push GHCR
# Testcontainers (PostgreSQL) requer Docker no runner
name: CI Video Service

on:
  push:
    branches: [main]
    paths:
      - 'video-service/**'
      - 'pom.xml'
      - '.github/workflows/ci-video-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'video-service/**'
      - 'pom.xml'
      - '.github/workflows/ci-video-service.yml'

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, test and SonarCloud
        run: |
          cd video-service && mvn -B verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=pos-tech-fiap-group \
            -Dsonar.coverage.exclusions="src/main/java/**/VideoServiceApplication.java,src/main/java/**/config/**/*.java,src/main/java/**/dto/**/*.java,src/main/java/**/exception/**/*.java,src/main/java/**/exceptionhandler/**/*.java,src/main/java/**/exceptions/**/*.java,src/main/java/**/ports/**/*.java,src/main/java/**/domain/enums/**/*.java,src/main/java/**/entity/**/*.java"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_VIDEO_PROCESSOR }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set GHCR image owner (lowercase)
        if: github.event_name != 'pull_request'
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: video-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER_LC }}/video-processor-video-service:${{ github.sha }}
            ghcr.io/${{ env.REPO_OWNER_LC }}/video-processor-video-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
