# CI: api-gateway - build, test (80% coverage), SonarCloud, build image, push GHCR
name: CI API Gateway

on:
  push:
    branches: [main]
    paths:
      - 'api-gateway/**'
      - 'pom.xml'
      - '.github/workflows/ci-api-gateway.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api-gateway/**'
      - 'pom.xml'
      - '.github/workflows/ci-api-gateway.yml'

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, test and SonarCloud
        run: |
          cd api-gateway && mvn -B verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=pos-tech-fiap-group \
            -Dsonar.coverage.exclusions="src/main/java/**/GatewayApplication.java,src/main/java/**/client/ValidateResponse.java"
        env:
          _JAVA_OPTIONS: -Djava.net.preferIPv4Stack=true
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_VIDEO_PROCESSOR }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set GHCR image owner (lowercase)
        if: github.event_name != 'pull_request'
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER_LC }}/video-processor-api-gateway:${{ github.sha }}
            ghcr.io/${{ env.REPO_OWNER_LC }}/video-processor-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
