# CI: api-gateway - build, test (80% coverage), SonarCloud, build image, push GHCR
name: CI API Gateway

on:
  push:
    branches: [main]
    paths:
      - 'api-gateway/**'
      - 'pom.xml'
      - '.github/workflows/ci-api-gateway.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api-gateway/**'
      - 'pom.xml'
      - '.github/workflows/ci-api-gateway.yml'

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, test and SonarCloud
        run: >
          cd api-gateway && mvn -B verify sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=pos-tech-fiap-group
          -Dsonar.scanner.metadataFilePath=${{ github.workspace }}/api-gateway/.scannerwork/report-task.txt
        env:
          _JAVA_OPTIONS: -Djava.net.preferIPv4Stack=true
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_VIDEO_PROCESSOR }}

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_VIDEO_PROCESSOR }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          scanMetadataReportFile: api-gateway/.scannerwork/report-task.txt
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/video-processor-api-gateway:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/video-processor-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
