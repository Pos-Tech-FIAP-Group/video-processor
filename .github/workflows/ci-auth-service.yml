# CI: auth-service - build, test (80% coverage), SonarCloud, build image, push GHCR
# Testcontainers (MongoDB) requires Docker on the runner - ubuntu-latest has it
name: CI Auth Service

on:
  push:
    branches: [main]
    paths:
      - 'auth-service/**'
      - 'pom.xml'
      - '.github/workflows/ci-auth-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'auth-service/**'
      - 'pom.xml'
      - '.github/workflows/ci-auth-service.yml'

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, test and SonarCloud
        run: >
          cd auth-service && mvn -B verify sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=pos-tech-fiap-group
          -Dsonar.scanner.metadataFilePath=${{ github.workspace }}/auth-service/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_VIDEO_PROCESSOR }}

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_VIDEO_PROCESSOR }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          scanMetadataReportFile: auth-service/.scannerwork/report-task.txt
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set GHCR image owner (lowercase)
        if: github.event_name != 'pull_request'
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: auth-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER_LC }}/video-processor-auth-service:${{ github.sha }}
            ghcr.io/${{ env.REPO_OWNER_LC }}/video-processor-auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
