server:
  port: 8081

spring:
  application:
    name: auth-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/auth_db

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits}
  expiration: 86400000  # 24 horas em ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
