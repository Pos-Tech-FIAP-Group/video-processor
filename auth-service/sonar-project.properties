# SonarCloud - Auth Service
# Project key alinhado ao Maven (groupId:artifactId)

sonar.host.url=https://sonarcloud.io
sonar.projectKey=com.fiap.fiapx:auth-service
sonar.projectName=Auth Service

# Relatório JaCoCo (caminho do XML). Exclusões de cobertura ficam no pom.xml:
# em projetos Maven o Sonar não aplica sonar.coverage.exclusions do .properties.
sonar.jacoco.reportPaths=target/site/jacoco/jacoco.xml
