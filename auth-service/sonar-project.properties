# SonarCloud - Auth Service
# Project key alinhado ao Maven (groupId:artifactId)

sonar.host.url=https://sonarcloud.io
sonar.projectKey=com.fiap.fiapx:auth-service
sonar.projectName=Auth Service

# Cobertura: exclusões alinhadas ao JaCoCo
sonar.coverage.exclusions=\
  **/AuthServiceApplication.java,\
  **/config/**/*.java,\
  **/dto/**/*.java,\
  **/exception/**/*.java,\
  **/ports/**/*.java,\
  **/domain/enums/**/*.java,\
  **/entity/UserDocument.java
