server:
  port: 8080

# Definido pelo entrypoint no Docker (IP do auth-service). Sem default = uso apenas via Docker.
auth:
  service-url: ${AUTH_SERVICE_URL}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: video-service
          uri: http://video-service:8082
          predicates:
            - Path=/api/videos/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
