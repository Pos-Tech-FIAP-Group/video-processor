server:
  port: 8080

# Definido pelo entrypoint no Docker (IP do auth-service). Sem default = uso apenas via Docker.
auth:
  service-url: ${AUTH_SERVICE_URL}

spring:
  application:
    name: api-gateway
  codec:
    max-in-memory-size: 500MB
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-User-Id
            maxAge: 3600
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
        - id: video-service
          uri: http://video-service:8082
          predicates:
            - Path=/api/videos/**
          filters:
            - name: RequestSize
              args:
                maxSize: 5000MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
