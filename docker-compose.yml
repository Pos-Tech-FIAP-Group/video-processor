version: "3.8"

services:
  postgres-video:
    image: postgres:16-alpine
    container_name: postgres-video
    environment:
      POSTGRES_DB: ${POSTGRES_VIDEO_DB:-video_db}
      POSTGRES_USER: ${POSTGRES_VIDEO_USER:-video_user}
      POSTGRES_PASSWORD: ${POSTGRES_VIDEO_PASSWORD:-video_pass}
    ports:
      - "${POSTGRES_VIDEO_PORT:-5434}:5432"
    volumes:
      - postgres_video_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_VIDEO_USER:-video_user} -d ${POSTGRES_VIDEO_DB:-video_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_video_data:
  rabbitmq_data: