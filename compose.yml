services:
  # --- Application Services ---
  api-gateway:
    image: ghcr.io/pos-tech-fiap-group/video-processor-api-gateway:latest
    platform: linux/amd64
    pull_policy: always
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service

  auth-service:
    image: ghcr.io/pos-tech-fiap-group/video-processor-auth-service:latest
    platform: linux/amd64
    pull_policy: always
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-min-256-bits}
    depends_on:
      mongodb:
        condition: service_healthy

  video-service:
    image: ghcr.io/pos-tech-fiap-group/video-processor-video-service:latest
    platform: linux/amd64
    pull_policy: always
    container_name: video-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-video:5432/video_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_VIDEO_USER:-video_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_VIDEO_PASSWORD:-video_pass}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin123}
      APP_STORAGE_TEMP_DIR: /shared/videos
    volumes:
      - video_shared:/shared/videos
    depends_on:
      postgres-video:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  processing-service:
    image: ghcr.io/pos-tech-fiap-group/video-processor-processing-service:latest
    platform: linux/amd64
    pull_policy: always
    container_name: processing-service
    ports:
      - "8083:8083"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin123}
      PROCESSING_STORAGE_BASE_PATH: /shared/videos
      # S3 (opcional: se não definir, o zip continua só em disco e o path local é publicado)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      PROCESSING_STORAGE_S3_BUCKET: ${PROCESSING_STORAGE_S3_BUCKET:-}
    volumes:
      - video_shared:/shared/videos
    depends_on:
      rabbitmq:
        condition: service_healthy

  web-app:
    build:
      context: .
      dockerfile: web-app/Dockerfile
    container_name: web-app
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
  
  notification-service:
    image: ghcr.io/pos-tech-fiap-group/video-processor-notification-service:latest
    platform: linux/amd64
    pull_policy: always
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin123}
      MAIL_HOST: sandbox.smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USERNAME: ${MAIL_USERNAME:-db7b281c04cce6}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-edf0b3531ea9ef}
    depends_on:
      rabbitmq:
        condition: service_healthy

  # --- Infrastructure Services ---
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: mongodb-auth
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-video:
    image: postgres:16-alpine
    container_name: postgres-video
    environment:
      POSTGRES_DB: ${POSTGRES_VIDEO_DB:-video_db}
      POSTGRES_USER: ${POSTGRES_VIDEO_USER:-video_user}
      POSTGRES_PASSWORD: ${POSTGRES_VIDEO_PASSWORD:-video_pass}
    ports:
      - "${POSTGRES_VIDEO_PORT:-5434}:5432"
    volumes:
      - postgres_video_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_VIDEO_USER:-video_user} -d ${POSTGRES_VIDEO_DB:-video_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
  postgres_video_data:
  rabbitmq_data:
  redis_data:
  video_shared:
