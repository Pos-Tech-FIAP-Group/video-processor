server:
  port: 8082

spring:
  application:
    name: video-service
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:admin}
    password: ${SPRING_RABBITMQ_PASSWORD:admin123}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/video_db}
    username: ${SPRING_DATASOURCE_USERNAME:video_user}
    password: ${SPRING_DATASOURCE_PASSWORD:video_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  storage:
    temp-dir: ${APP_STORAGE_TEMP_DIR:../tmp/videos}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits}